name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: leanprover/lean-action@v1
        with:
          auto-config: "true"

      - name: Bench (quick)
        shell: bash
        run: lake exe bench -- --quick

      - name: Conformance report stub
        shell: bash
        run: bash scripts/gen-conformance-report.sh

      - name: Upload conformance JSON
        uses: actions/upload-artifact@v4
        with:
          name: conformance-report-${{ matrix.os }}
          path: docs/conformance-report.json

  conformance-parquet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch parquet-testing
        shell: bash
        run: bash scripts/fetch-fixtures.sh
      - uses: leanprover/lean-action@v1
        with:
          auto-config: "true"
